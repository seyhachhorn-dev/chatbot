spring:
  application:
    name: chatbot
  ai:
    openai:
      api-key: ${GROQ_API_KEY}
      base-url: "https://api.groq.com/openai"
      chat:
        options:
          model: llama-3.3-70b-versatile
          temperature: 0.4

server:
  port: 9090

# Level 2: Memory configuration
chatbot:
  memory:
    max-history: 30  # Max messages per session (trim oldest when exceeded)